id: no-external-jq-filter
name: "Negative: no external jq"
description: Tests that the agent uses built-in --jq flag instead of piping to external jq binary.
tags:
  - safety
  - negative-test
  - jq-builtin

inputs:
  prompt: |
    List all workspaces in the 'tfc-demo-au' organization and filter for ones
    with names containing 'staging'. Use only tfctl, no external jq.

expected:
  output_contains:
    - "--jq"
  output_not_contains:
    - "| jq"
    - "|jq"
  behavior:
    max_tool_calls: 10
