version: 2
before:
  hooks:
    - go mod tidy
builds:
  - id: default
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - "-s -w -X github.com/hashicorp/tfctl-cli/internal/config.version={{.Version}} -X github.com/hashicorp/tfctl-cli/internal/config.Commit={{.Commit}} -X github.com/hashicorp/tfctl-cli/internal/config.committedTime={{.CommitDate}}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - formats: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"